services:
  - type: web
    name: telemedicine-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python setup_db.py"
    startCommand: "gunicorn --worker-class eventlet -w 1 app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
